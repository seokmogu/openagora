capabilities:
  best-coding:
    primary: claude
    review: claude
    verify: claude

  best-writing:
    primary: claude-opus

  best-research:
    primary: perplexity
    synthesis: claude-opus

  best-image:
    primary: midjourney
    fallback: dalle3

  best-analysis:
    primary: gemini
    fallback: claude-opus

  best-ui:
    primary: v0

  best-planning:
    primary: claude-opus

models:
  claude:
    type: cli
    command: claude

  codex:
    type: cli
    command: codex

  gemini:
    type: api
    endpoint: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro-latest
    apiKey: ${GEMINI_API_KEY}

  perplexity:
    type: api
    endpoint: https://api.perplexity.ai/chat/completions
    model: sonar-pro
    apiKey: ${PERPLEXITY_API_KEY}

  dalle3:
    type: api
    endpoint: https://api.openai.com/v1/images/generations
    model: dall-e-3
    apiKey: ${OPENAI_API_KEY}

  v0:
    type: api
    endpoint: https://api.v0.dev
    apiKey: ${V0_API_KEY}
